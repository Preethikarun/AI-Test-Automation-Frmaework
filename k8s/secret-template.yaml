# Secret template — actual values injected by CI pipeline
# Never commit real values — use GitHub Secrets + CI injection
# To create manually:
#   kubectl create secret generic ai-test-secrets \
#     --namespace=ai-test-framework \
#     --from-literal=GEMINI_API_KEY=your-key \
#     --from-literal=ANTHROPIC_API_KEY=your-key

apiVersion: v1
kind: Secret
metadata:
  name: ai-test-secrets
  namespace: ai-test-framework
type: Opaque
data:
  # Values are base64 encoded — injected by CI, never hardcoded here
  # echo -n "your-key" | base64
  GEMINI_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE