[pytest]
markers =
    smoke:      quick critical path — runs on every push
    regression: full suite — runs nightly or on release
    flaky:      quarantined unstable tests — runs separately
    ui:         Playwright browser tests
    api:        REST/SOAP/GraphQL tests

addopts =
    --tb=short
    -v
    --alluredir=reports/allure-results
    --reruns=2
    --reruns-delay=1

testpaths = tests