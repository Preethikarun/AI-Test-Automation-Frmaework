name: AI Test Automation Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:

  # ── JOB 1: LINT ───────────────────────────────────────────
  lint:
    name: Code quality check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 agents/ pages/ locators/ tests/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503 \
            --exclude=venv/,__pycache__/

  # ── JOB 2: TEST ───────────────────────────────────────────
  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    needs: lint           # only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-test-framework .

      - name: Create reports directory
        run: mkdir -p reports/allure-results reports/screenshots

      - name: Run tests in Docker
        run: |
          docker run \
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            -v ${{ github.workspace }}/har:/app/har \
            -v ${{ github.workspace }}/reports:/app/reports \
            ai-test-framework \
            pytest tests/ -v \
              --alluredir=reports/allure-results \
              --tb=short
        continue-on-error: true    

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()              # upload even if tests failed
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-screenshots
          path: reports/screenshots/
          retention-days: 7

  # ── JOB 3: REPORT ─────────────────────────────────────────
  report:
    name: Publish Allure report
    runs-on: ubuntu-latest
    needs: test           # only runs after test job completes
    if: always()          # publish report even if tests failed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/
        continue-on-error: true

      - name: Ensure allure-results folder exists
        run: mkdir -p reports/allure-results

      - name: Set up Java (Allure needs it)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure HTML report
        run: |
          allure generate reports/allure-results \
            -o reports/allure-html \
            --clean

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-html
          publish_branch: gh-pages
          commit_message: "ci: update Allure report [${{ github.run_number }}]"

      - name: Post report URL to job summary
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "Published to GitHub Pages:" >> $GITHUB_STEP_SUMMARY
          echo "https://YOUR_USERNAME.github.io/ai-test-automation-framework" \
            >> $GITHUB_STEP_SUMMARY

  # ── JOB 4: SECURITY (stretch) ─────────────────────────────
  security:
    name: OWASP ZAP security scan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'   # main branch only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "https://demo.playwright.dev/todomvc"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"             # -I = don't fail on warnings
        continue-on-error: true         # don't block pipeline on findings

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
          retention-days: 30